version: '3.8'

services:
  node1:
    build: .
    environment:
      - RAFT_NODE_ID=1
      - RAFT_PEERS=node2:50052,node3:50053
    ports:
      - "50051:50051"
    volumes:
      - ./data/node1:/data

  node2:
    build: .
    environment:
      - RAFT_NODE_ID=2
      - RAFT_PEERS=node1:50051,node3:50053
    ports:
      - "50052:50052"
    volumes:
      - ./data/node2:/data

  node3:
    build: .
    environment:
      - RAFT_NODE_ID=3
      - RAFT_PEERS=node1:50051,node2:50052
    ports:
      - "50053:50053"
    volumes:
      - ./data/node3:/data
